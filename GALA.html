<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JOIA Paraíso - Gala Night</title>
    <style>
        :root {
            --fondo-joia: #17505a;
            --crema-joia: #e7dac5;
            --azul-oscuro: #0f353d;
            --dorado-borde: #a68966;
            --overlay-top: rgba(23, 80, 90, 0.538);
            --overlay-bottom: rgba(15, 53, 61, 0.8);
        }

        /* RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; }

        body {
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: relative;
            background: #071617;
        }

        /* BACKGROUND SLIDES */
        .bg-slider {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1s ease;
            transform-origin: center center;
            will-change: transform, opacity;
            z-index: 1;
            /* default no filter; the JS will add .distort on active slides */
            filter: none;
        }
        .bg-slide.active {
            opacity: 1;
            animation: zoomIn var(--slide-duration) linear forwards;
        }
        .bg-slide.distort {
            /* apply our SVG displacement filter */
            filter: url(#cushionDistort);
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(var(--overlay-top), var(--overlay-bottom));
            mix-blend-mode: normal;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes zoomIn {
            from { transform: scale(1.02); }
            to   { transform: scale(1.07); }
        }

        .main-viewport {
            position: relative;
            z-index: 6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2vmin;
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.3s ease;
        }

        /* HEADER */
        .header-joia {
            margin-bottom: clamp(10px, 3vh, 30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            width: clamp(150px, 15vw, 250px);
            flex-shrink: 0;
        }

        /* STAR WRAP: contenedor que genera el glow detrás con pseudo-elemento.
           El pseudo-elemento usa la misma imagen como background para respetar la forma (no rectángulo).
           Por defecto el halo está oculto (opacity:0). Aparece en hover y durante la intro (rotación). */
        .star-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
            width: auto;
            height: clamp(40px, 8vh, 120px);
            z-index: 10;
            pointer-events: auto;
        }
        .star-wrap::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1.05);
            width: 120%;
            height: 120%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            filter: blur(10px) brightness(2);
            opacity: 0; /* oculto por defecto */
            transition: filter 320ms ease, opacity 320ms ease, transform 320ms ease;
            z-index: 0;
            pointer-events: none;
        }
        .star-wrap img.logo-estrella {
            position: relative;
            display: block;
            width: auto;
            height: 100%;
            z-index: 1;
            filter: brightness(0) invert(1); /* estrella blanca */
            transition: transform 800ms cubic-bezier(.22,.9,.3,1), filter 260ms ease;
        }

        /* hover / glow state: muestra halo y rota estrella */
        .star-wrap:hover::before,
        .star-wrap.glow::before {
            filter: blur(16px) brightness(2.0);
            transform: translate(-50%, -50%) scale(1.12);
            opacity: 0.85;
        }
        .star-wrap:hover img.logo-estrella,
        .star-wrap.glow img.logo-estrella {
            transform: rotate(220deg) scale(1.12);
        }

        /* intro: show halo during intro animation only */
        .star-wrap.intro::before {
            opacity: 0.85;
            filter: blur(14px) brightness(1.9);
            transform: translate(-50%, -50%) scale(1.10);
        }
        .star-wrap.intro img.logo-estrella {
            animation: starIntro 2000ms cubic-bezier(.22,.9,.3,1) both;
        }
        @keyframes starIntro {
            from { transform: scale(0.6) rotate(0deg); opacity: 0; }
            60% { transform: scale(1.05) rotate(360deg); opacity: 1; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* RESTO DEL LAYOUT (sin cambios significativos) */
        .joia-tit {
            font-weight: 300;
            font-size: clamp(45px, 5vw, 90px);
            line-height: 0.8;
            margin: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .paraiso-tit {
            font-size: clamp(14px, 1.4vw, 26px);
            margin: 8px 0 2px 0;
            font-weight: bold;
            width: 100%;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3em;
        }
        .by-tit {
            font-size: clamp(10px, 1vw, 18px);
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.2em;
        }

        .container {
            background: var(--crema-joia);
            padding: clamp(15px, 2.5vmin, 40px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-top: clamp(4px, 0.5vw, 10px) solid var(--dorado-borde);
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 95vw;
            max-height: 65vh;
            position: relative;
            z-index: 7;
            overflow: visible;
        }

        .gala-flex {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(8px, 1.5vmin, 20px);
        }

        .gala-flex:hover .gala-card:not(:hover) {
            filter: brightness(0.6) grayscale(0.3);
            transform: scale(0.92);
            opacity: 0.8;
        }

        .gala-card {
            width: clamp(100px, 12vw, 180px);
            height: clamp(250px, 45vh, 500px);
            background: #fff;
            border-radius: clamp(10px, 1.5vw, 20px);
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: grab;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }
        .gala-card:hover {
            width: clamp(250px, 28vw, 450px);
            transform: translateY(-30px) scale(1.05) !important;
            z-index: 999;
            box-shadow: 0 50px 90px rgba(0,0,0,0.45), 0 0 18px rgba(255,255,255,0.12);
            filter: brightness(1.06) !important;
            opacity: 1 !important;
        }

        .img-wrapper { width: 100%; height: 100%; overflow: hidden; }
        .gala-flex:hover .gala-card:not(:hover) {
            filter: brightness(0.6) grayscale(0.3);
            transform: scale(0.92);
            opacity: 0.8;
        }

        .gala-card {
            width: clamp(100px, 12vw, 180px);
            height: clamp(250px, 45vh, 500px);
            background: #fff;
            border-radius: clamp(10px, 1.5vw, 20px);
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: grab;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }
        .gala-card:hover {
            width: clamp(250px, 28vw, 450px);
            transform: translateY(-30px) scale(1.05) !important;
            z-index: 999; /* sobresale por encima de todo */
            box-shadow: 0 50px 90px rgba(0,0,0,0.45), 0 0 18px rgba(255,255,255,0.12);
            filter: brightness(1.06) !important;
            opacity: 1 !important;
        }

        .img-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .gala-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: blur(7px);
            transform: scale(1.18);
            transition: filter 0.6s ease, transform 4s linear;
        }
        .gala-card:hover img {
            filter: blur(0px);
            transform: scale(1.03);
        }

        .card-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: clamp(40px, 6vh, 70px);
            background: var(--azul-oscuro);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(12px, 1.2vw, 18px);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 5;
        }

        .instrucciones {
            margin-top: clamp(15px, 3vh, 30px);
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(14px, 1vw, 14px);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            z-index: 6;
        }

        @media (max-width: 720px) {
            .gala-card { width: 44vw; }
            .gala-card:hover { width: 72vw; }
            .container { max-height: 80vh; padding: 4vmin; }
        }

        :root { --slide-duration: 10s; }
    </style>

    <!-- SVG filter defs for cushion/distortion effect -->
    <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:visible;">
        <filter id="cushionDistort" filterUnits="objectBoundingBox" x="-20%" y="-20%" width="140%" height="140%">
            <!-- turbulence node, will be animated by JS -->
            <feTurbulence id="turb" baseFrequency="0.0015 0.002" numOctaves="2" seed="3" stitchTiles="stitch" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>
</head>
<body>
    <!-- BACKGROUND SLIDER -->
    <div class="bg-slider" id="bgSlider" aria-hidden="true">
        <div class="bg-overlay" aria-hidden="true"></div>
    </div>

    <div class="main-viewport" role="main" aria-label="Gala landing">
        <div class="header-joia">
            <!-- star-wrap: pseudo-element uses same image as background to create shaped glow -->
            <div class="star-wrap" id="starWrap" aria-hidden="false">
                <img id="starLogo" class="logo-estrella" alt="estrella Joia"
                     src="https://i.imgur.com/jXCqCpg.png"
                     onerror="console.warn('Star image load failed');">
            </div>

            <div class="joia-tit"><span>J</span><span>O</span><span>I</span><span>A</span></div>
            <div class="paraiso-tit"><span>P</span><span>A</span><span>R</span><span>A</span><span>Í</span><span>S</span><span>O</span></div>
            <div class="by-tit"><span>B</span><span>Y</span><span> </span><span>I</span><span>B</span><span>E</span><span>R</span><span>O</span><span>S</span><span>T</span><span>A</span><span>R</span></div>
        </div>

        <div class="container">
            <div class="gala-flex">
                <div class="gala-card">
                    <div class="img-wrapper"><img src="https://lh3.googleusercontent.com/d/1hCz4S75ccsbnX64_tBlZExHEN2xksdIb" draggable="true" alt="Español"></div>
                    <div class="card-label">Español</div>
                </div>
                <div class="gala-card">
                    <div class="img-wrapper"><img src="https://lh3.googleusercontent.com/d/1bDV68Y-2H_SpMYMxWMxxuZJ1GPUo8we6" draggable="true" alt="Inglés"></div>
                    <div class="card-label">Inglés</div>
                </div>
                <div class="gala-card">
                    <div class="img-wrapper"><img src="https://lh3.googleusercontent.com/u/0/d/1tIb6eyGLyLbpE7Cr7LFRB9_ss5WRTOkk" draggable="true" alt="Francés"></div>
                    <div class="card-label">Francés</div>
                </div>
                <div class="gala-card">
                    <div class="img-wrapper"><img src="https://lh3.googleusercontent.com/u/0/d/1UMaBvuC97rc7WXj16ybHVqLiNcov6esG" draggable="true" alt="Portugués"></div>
                    <div class="card-label">Portugués</div>
                </div>
                <div class="gala-card">
                    <div class="img-wrapper"><img src="https://lh3.googleusercontent.com/u/0/d/1GDEWl4Qi4YPYGkctpbGTpEVfjb640CQH" draggable="true" alt="Alemán"></div>
                    <div class="card-label">Alemán</div>
                </div>
            </div>
        </div>

        <div class="instrucciones">
            Pasa el cursor para ver la imagen y arrastra sin soltar a la bandeja de la APP
        </div>
    </div>

    <script>
    (function () {
        const starWrap = document.getElementById('starWrap');
        const starImg = document.getElementById('starLogo');

        function applyPseudoBackground() {
            if (!starWrap || !starImg) return;
            const src = starImg.getAttribute('src') || '';
            // create/replace style rule for pseudo to set same background-image
            let styleEl = document.getElementById('starPseudoStyle');
            const rule = `.star-wrap::before { background-image: url("${src}"); }`;
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'starPseudoStyle';
                styleEl.innerHTML = rule;
                document.head.appendChild(styleEl);
            } else {
                styleEl.innerHTML = rule;
            }
        }

        applyPseudoBackground();
        starImg.addEventListener('load', applyPseudoBackground);
        starImg.addEventListener('error', () => { console.warn('Star image failed to load; glow may not appear.'); });

        // intro: show halo only during startup animation, then remove 'intro' class to hide halo
        window.addEventListener('load', () => {
            starWrap.classList.add('intro');
            // keep intro halo visible while animation runs, then remove intro class so halo is off
            setTimeout(()=> starWrap.classList.remove('intro'), 1000);
        });
        // hover: add/remove 'glow' (this also triggers halo)
        starWrap.addEventListener('mouseenter', () => starWrap.classList.add('glow'));
        starWrap.addEventListener('mouseleave', () => starWrap.classList.remove('glow'));

        // SLIDER + cushion distortion
        const slideDurationMs = 10000;
        const fadeDurationMs = 1000;
        const slidesRoot = document.getElementById('bgSlider');

        const rawUrls = [
            "https://iberostar-949.vmwareidentity.de/SAAS/jersey/manager/api/images/u/c0e633b8-3f59-44da-89df-5f0da55a921c",
            "//apiimg.iberostar.com/uploads/image/86577/crops/16:9/1920/image",
            "//apiimg.iberostar.com/uploads/image/88245/crops/16:9/1920/image.jpeg",
            "//apiimg.iberostar.com/uploads/image/88238/crops/16:9/1920/image.jpeg",
            "//apiimg.iberostar.com/uploads/image/88341/crops/16:9/1920/image.jpeg",
            "//apiimg.iberostar.com/uploads/image/88248/crops/16:9/1920/image.jpeg",
            "//apiimg.iberostar.com/uploads/image/88246/crops/16:9/1920/image.jpeg",
            "//apiimg.iberostar.com/uploads/image/83405/crops/3:2/image.jpg",
            "https://cdn.hotelverse.tech/installationimages/h_3a86135c-2026-4b37-acf8-79105e5bd0d5/i_9547/028eb01f-3580-4168-985d-28e7133b12a8/original.webp",
            "https://cdn.hotelverse.tech/installationimages/h_3a86135c-2026-4b37-acf8-79105e5bd0d5/i_9543/e80ebfe0-10ca-4783-80e2-e9e739dedb72/original.webp",
            "//apiimg.iberostar.com/uploads/image/68315/crops/16:9/392/image.jpeg"
        ];
        const normUrls = rawUrls.map(u => u.startsWith('//') ? 'https:' + u : u);
        const urls = Array.from(new Set(normUrls));
        const slides = [];

        function createSlide(url) {
            const div = document.createElement('div');
            div.className = 'bg-slide';
            div.style.backgroundImage = `url("${url}")`;
            const seconds = (slideDurationMs / 1000).toFixed(2) + 's';
            div.style.setProperty('--slide-duration', seconds);
            slidesRoot.appendChild(div);
            slides.push(div);
        }

        function preloadAll(list) {
            return Promise.all(list.map(u => new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve({url: u, ok:true});
                img.onerror = () => resolve({url: u, ok:false});
                setTimeout(() => { if (!img.complete) img.src = u; }, 10);
                img.src = u;
            })));
        }

        preloadAll(urls).then(results => {
            const goodUrls = results.map(r => r.url);
            goodUrls.forEach(u => createSlide(u));
            if (!slides.length) return;

            // active slide + add distort class
            let current = 0;
            slides[current].classList.add('active', 'distort');

            // cycle slides, ensure only active has .distort to minimize filter cost
            setInterval(() => {
                const prev = current;
                current = (current + 1) % slides.length;
                slides[current].classList.add('active','distort');
                // fade previous out
                setTimeout(() => {
                    slides[prev].classList.remove('active','distort');
                    // reset animation so zoom restarts next time
                    slides[prev].style.animation = 'none';
                    void slides[prev].offsetWidth;
                    slides[prev].style.animation = '';
                }, fadeDurationMs);
            }, slideDurationMs);
        });

        // Animate turbulence baseFrequency for subtle cushion distortion
        const turb = document.getElementById('turb');
        if (turb) {
            let start = performance.now();
            function tick(now) {
                const t = (now - start) / 1000;
                // base frequency oscillates slowly; values kept small for subtle effect
                const bf = 0.0008 + Math.sin(t * 0.45) * 0.0006; // vary between ~0.0002..0.0014
                const bfY = bf * 1.2;
                try { turb.setAttribute('baseFrequency', `${Math.abs(bf)} ${Math.abs(bfY)}`); }
                catch(e) {}
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        slidesRoot.setAttribute('aria-hidden', 'true');
    })();
    </script>
</body>
</html>
